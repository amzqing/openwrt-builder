name: Build OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gettext git \
            libncurses-dev libssl-dev python3 python3-setuptools \
            python3-pyelftools rsync swig unzip zlib1g-dev file \
            wget curl libelf-dev make ca-certificates subversion

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git
          cd openwrt
          git checkout openwrt-25.12

      - name: Add Nikki
        run: |
          cd openwrt
          git clone https://github.com/nikkinikki-org/OpenWrt-nikki package/OpenWrt-nikki

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Write config
        run: |
          cd openwrt

          cat > .config << 'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_d-team_newifi-d2=y

          CONFIG_PACKAGE_luci=y

          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-package-manager-zh-cn=y

          CONFIG_PACKAGE_block-mount=y

          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y

          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-exfat=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_kmod-fs-ntfs3=y

          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_wget-ssl=y

          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y

          CONFIG_PACKAGE_luci-app-nikki=y
          EOF

          mkdir -p files/etc/uci-defaults

          cat > files/etc/uci-defaults/99-custom-defaults << 'EOF'
          #!/bin/sh

          uci del network.lan.ipaddr 2>/dev/null
          uci add_list network.lan.ipaddr='192.168.0.1/24'
          uci commit network

          exit 0
          EOF

          chmod +x files/etc/uci-defaults/99-custom-defaults

          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j8

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Rename firmware
        run: |
          cd openwrt/bin/targets/ramips/mt7621

          DATE=$(date +%Y%m%d-%H%M)

          for f in *sysupgrade.bin; do
            mv "$f" "newifi-d2-nikki-${DATE}.bin"
          done

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: newifi-d2-openwrt
          path: openwrt/bin/targets/ramips/mt7621/*.bin
