name: Build OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gettext git \
            libncurses-dev libssl-dev python3 python3-setuptools \
            python3-pyelftools rsync swig unzip zlib1g-dev file \
            wget curl libelf-dev make ca-certificates subversion ccache

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git
          cd openwrt
          git checkout openwrt-25.12

      - name: Add OpenClash
        run: |
          cd openwrt
          git clone --depth=1 https://github.com/vernesong/OpenClash.git package/OpenClash

      - name: Cache OpenWrt downloads
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/staging_dir
            ~/.ccache
          key: openwrt-${{ runner.os }}-${{ hashFiles('**/.config') }}
          restore-keys: |
            openwrt-${{ runner.os }}-

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Write config
        run: |
          cd openwrt

          cat > .config <<'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_d-team_newifi-d2=y

          CONFIG_PACKAGE_luci=y

          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-package-manager-zh-cn=y

          CONFIG_PACKAGE_luci-app-openclash=y

          CONFIG_PACKAGE_dnsmasq-full=y

          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_ca-certificates=y

          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_curl=y

          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_libopenssl-conf=y

          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_coreutils=y
          CONFIG_PACKAGE_coreutils-nohup=y

          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_jsonfilter=y
          CONFIG_PACKAGE_unzip=y

          CONFIG_PACKAGE_ruby=y
          CONFIG_PACKAGE_ruby-yaml=y

          CONFIG_PACKAGE_block-mount=y

          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y

          CONFIG_PACKAGE_kmod-fs-ext4=y

          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-inet-diag=y

          CONFIG_PACKAGE_kmod-nft-tproxy=y

          CONFIG_PACKAGE_kmod-nf-conntrack=y
          CONFIG_PACKAGE_kmod-nf-conntrack-netlink=y
          CONFIG_PACKAGE_kmod-nfnetlink=y
          CONFIG_PACKAGE_kmod-nf-nat=y

          CONFIG_PACKAGE_openssh-sftp-server=y

          CONFIG_CCACHE=y

          # CONFIG_TARGET_ROOTFS_INITRAMFS is not set
          EOF

          mkdir -p files/etc/uci-defaults

          cat > files/etc/uci-defaults/99-custom-defaults <<'EOF'
          #!/bin/sh

          uci del network.lan.ipaddr 2>/dev/null
          uci add_list network.lan.ipaddr='192.168.0.1/24'
          uci commit network

          uci set network.wan.peerdns='0'
          uci -q delete network.wan.dns

          uci add_list network.wan.dns='116.116.116.116'
          uci add_list network.wan.dns='221.5.88.88'
          uci add_list network.wan.dns='1.1.1.1'

          uci commit network

          uci set dhcp.@dnsmasq[0].noresolv='1'

          uci -q delete dhcp.@dnsmasq[0].server

          uci add_list dhcp.@dnsmasq[0].server='116.116.116.116'
          uci add_list dhcp.@dnsmasq[0].server='221.5.88.88'
          uci add_list dhcp.@dnsmasq[0].server='1.1.1.1'

          uci set dhcp.@dnsmasq[0].localuse='1'

          uci commit dhcp

          exit 0
          EOF

          chmod +x files/etc/uci-defaults/99-custom-defaults

          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j8

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc)

      - name: Rename firmware
        run: |
          cd openwrt/bin/targets/ramips/mt7621

          DATE=$(date +%Y%m%d-%H%M)

          for f in *sysupgrade.bin; do
            mv "$f" "newifi-d2-openclash-${DATE}.bin"
          done

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: newifi-d2-openclash
          path: openwrt/bin/targets/ramips/mt7621/*.bin
