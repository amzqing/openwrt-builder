name: Build OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gettext git libncurses-dev libssl-dev python3 python3-setuptools python3-pyelftools rsync swig unzip zlib1g-dev file wget curl libelf-dev make ca-certificates subversion

      - name: Clone OpenWrt
        run: |
          git clone https://github.com/openwrt/openwrt.git
          cd openwrt
          git checkout openwrt-25.12

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Write config
        run: |
          cd openwrt

          cat > .config <<'EOF'
          CONFIG_TARGET_ramips=y
          CONFIG_TARGET_ramips_mt7621=y
          CONFIG_TARGET_ramips_mt7621_DEVICE_d-team_newifi-d2=y

          CONFIG_PACKAGE_luci=y
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-package-manager-zh-cn=y

          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_ca-certificates=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_libopenssl=y
          CONFIG_PACKAGE_libopenssl-conf=y
          CONFIG_PACKAGE_libcurl=y

          CONFIG_PACKAGE_dnsmasq=y

          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_kmod-usb-core=y
          CONFIG_PACKAGE_kmod-usb3=y
          CONFIG_PACKAGE_kmod-usb-storage=y

          CONFIG_PACKAGE_kmod-fs-ext4=y
          CONFIG_PACKAGE_kmod-fs-exfat=y
          CONFIG_PACKAGE_kmod-fs-vfat=y
          CONFIG_PACKAGE_kmod-fs-ntfs3=y

          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-dummy=y
          CONFIG_PACKAGE_kmod-inet-diag=y
          CONFIG_PACKAGE_kmod-nft-socket=y
          CONFIG_PACKAGE_kmod-nft-tproxy=y
          EOF

          mkdir -p files/etc/uci-defaults

          cat > files/etc/uci-defaults/99-custom-defaults <<'EOF'
          #!/bin/sh

          uci del network.lan.ipaddr 2>/dev/null
          uci add_list network.lan.ipaddr='192.168.0.1/24'
          uci commit network

          uci set network.wan.peerdns='0'
          uci -q delete network.wan.dns
          uci add_list network.wan.dns='119.29.29.29'
          uci add_list network.wan.dns='223.5.5.5'
          uci add_list network.wan.dns='1.1.1.1'
          uci commit network

          uci set dhcp.@dnsmasq[0].noresolv='1'
          uci -q delete dhcp.@dnsmasq[0].server
          uci add_list dhcp.@dnsmasq[0].server='119.29.29.29'
          uci add_list dhcp.@dnsmasq[0].server='223.5.5.5'
          uci add_list dhcp.@dnsmasq[0].server='1.1.1.1'
          uci set dhcp.@dnsmasq[0].localuse='1'
          uci commit dhcp

          exit 0
          EOF

          chmod +x files/etc/uci-defaults/99-custom-defaults

          make defconfig

      - name: Download packages
        run: |
          cd openwrt
          make download -j8

      - name: Build firmware
        run: |
          cd openwrt
          make -j$(nproc) V=s

      - name: Rename firmware
        run: |
          cd openwrt/bin/targets/ramips/mt7621

          DATE=$(date +%Y%m%d-%H%M)

          for f in *sysupgrade.bin; do
            mv "$f" "newifi-d2-base-${DATE}.bin"
          done

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: newifi-d2-base-openwrt
          path: openwrt/bin/targets/ramips/mt7621/*.bin
